<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFクラウド 仕訳コンバーター</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (ブラウザ上でJSXをコンパイル) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- アイコンコンポーネント（外部依存をなくすためのインラインSVG） ---
        const Upload = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const FileText = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>;
        const Settings = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const ArrowRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
        const Download = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const Trash2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const Plus = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const CheckCircle2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const XCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;
        // -----------------------------------------------------------------

        // 初期設定のルール（チートシートに基づく）
        const DEFAULT_RULES = [
          { id: 1, keyword: 'Kindle', category: '新聞図書費', subCategory: '' },
          { id: 2, keyword: 'テレ東', category: '新聞図書費', subCategory: '' },
          { id: 3, keyword: 'note', category: '新聞図書費', subCategory: '' },
          { id: 4, keyword: 'YOUTUBE', category: '新聞図書費', subCategory: '' },
          { id: 5, keyword: 'MAKONARI', category: '新聞図書費', subCategory: '' },
          { id: 6, keyword: 'LIBECITY', category: '諸会費', subCategory: '' },
          { id: 7, keyword: '同友会', category: '諸会費', subCategory: '' },
          { id: 8, keyword: 'ChatGPT', category: 'システム利用料', subCategory: '' },
          { id: 9, keyword: 'GOOGLE', category: 'システム利用料', subCategory: '' },
          { id: 10, keyword: 'APPLE', category: 'システム利用料', subCategory: '' },
          { id: 11, keyword: 'VREW', category: 'システム利用料', subCategory: '' },
          { id: 12, keyword: 'マネ-フォワ-ド', category: 'システム利用料', subCategory: '' },
          { id: 13, keyword: '電気', category: '水道光熱費', subCategory: '自宅' },
          { id: 14, keyword: '水道', category: '水道光熱費', subCategory: '自宅' },
          { id: 15, keyword: '日本通信', category: '通信費', subCategory: '' },
          { id: 16, keyword: 'AWS', category: 'システム利用料', subCategory: '' },
          { id: 17, keyword: 'GITHUB', category: 'システム利用料', subCategory: '' }
        ];

        // MFクラウドの一般的な勘定科目リスト
        const CATEGORIES = [
          '未定', '通信費', 'システム利用料', '新聞図書費', '諸会費', '交際費', '会議費', 
          '研修費', '教育訓練費', '水道光熱費', '消耗品費', '旅費交通費', '地代家賃', '支払手数料'
        ];

        function App() {
          const [step, setStep] = useState(1);
          const [csvData, setCsvData] = useState([]);
          const [headers, setHeaders] = useState([]);
          const [fileName, setFileName] = useState('');
          
          // マッピング設定
          const [colMap, setColMap] = useState({ date: '', desc: '', amount: '' });
          
          // 抽出データとルール
          const [records, setRecords] = useState([]);
          const [rules, setRules] = useState(DEFAULT_RULES);
          const [isRuleModalOpen, setIsRuleModalOpen] = useState(false);

          // CSVパース関数（簡易版：ダブルクォーテーション対応）
          const parseCSV = (text) => {
            const lines = text.split(/\r?\n/);
            return lines.map(line => {
              const regex = /(?:^|,)(?:"([^"]*)"|([^,]*))/g;
              let match;
              const row = [];
              while ((match = regex.exec(line))) {
                if (match[1] !== undefined || match[2] !== undefined) {
                  row.push(match[1] !== undefined ? match[1] : match[2]);
                }
              }
              return row;
            }).filter(row => row.some(cell => cell.trim() !== ''));
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setFileName(file.name);

            const reader = new FileReader();
            reader.onload = (event) => {
              const text = event.target.result;
              const parsed = parseCSV(text);
              if (parsed.length > 0) {
                setHeaders(parsed[0]);
                setCsvData(parsed.slice(1));
                
                // 自動で列を推測
                const newColMap = { date: '', desc: '', amount: '' };
                parsed[0].forEach((header, index) => {
                  if (header.includes('日')) newColMap.date = index;
                  else if (header.includes('摘要') || header.includes('利用店') || header.includes('内容')) newColMap.desc = index;
                  else if (header.includes('金額') || header.includes('支払')) newColMap.amount = index;
                });
                setColMap(newColMap);
                setStep(2);
              }
            };
            // 日本語CSVの文字化けを防ぐためShift_JISなどが必要な場合は適宜変更（ブラウザ環境による）
            reader.readAsText(file); 
          };

          const processRecords = () => {
            const newRecords = csvData.map((row, index) => {
              const date = row[colMap.date] || '';
              const desc = row[colMap.desc] || '';
              // 金額からカンマ等を除去して数値化
              let amountStr = row[colMap.amount] || '0';
              amountStr = amountStr.replace(/[^0-9.-]/g, '');
              const amount = Math.abs(parseInt(amountStr, 10)) || 0;

              // ルール適用
              let category = '未定';
              let subCategory = '';
              let isTarget = false; // デフォルトは対象外（プライベート）

              // 摘要が空でなく、金額が0でない場合のみ判定
              if (desc && amount > 0) {
                for (const rule of rules) {
                  if (desc.toUpperCase().includes(rule.keyword.toUpperCase())) {
                    category = rule.category;
                    subCategory = rule.subCategory;
                    isTarget = true; // キーワードに引っかかったら事業用としてチェック
                    break;
                  }
                }
              }

              return {
                id: index,
                date,
                desc,
                amount,
                category,
                subCategory,
                creditCategory: '事業主借', // 経費の貸方はデフォルトで事業主借
                isTarget
              };
            });

            setRecords(newRecords.filter(r => r.date !== '')); // 日付が空の行は除外
            setStep(3);
          };

          const handleRecordChange = (id, field, value) => {
            setRecords(records.map(r => r.id === id ? { ...r, [field]: value } : r));
          };

          const exportCSV = () => {
            const targetRecords = records.filter(r => r.isTarget);
            
            // MFクラウド仕訳帳インポートフォーマット（簡易版）
            // 取引日, 借方勘定科目, 借方補助科目, 借方金額(円), 貸方勘定科目, 貸方補助科目, 貸方金額(円), 摘要
            let csvContent = "取引日,借方勘定科目,借方補助科目,借方金額(円),貸方勘定科目,貸方補助科目,貸方金額(円),摘要\n";
            
            targetRecords.forEach(r => {
              // 日付フォーマットの簡易整形
              const cleanDate = r.date.replace(/\s/g, '');
              const cleanDesc = `"${r.desc.replace(/"/g, '""')}"`; // エスケープ
              
              const row = [
                cleanDate,
                r.category,
                r.subCategory || '',
                r.amount,
                r.creditCategory,
                '', // 貸方補助科目は今回はなし
                r.amount,
                cleanDesc
              ];
              csvContent += row.join(',') + '\n';
            });

            // BOMを追加してUTF-8での文字化けを防ぐ
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `MF仕訳インポート_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          // ルール設定モーダル
          const RuleSettingsModal = () => (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-xl max-w-2xl w-full max-h-[80vh] flex flex-col">
                <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50 rounded-t-xl">
                  <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <Settings className="w-5 h-5 text-indigo-600" />
                    自動仕訳ルール設定
                  </h2>
                  <button onClick={() => setIsRuleModalOpen(false)} className="text-gray-400 hover:text-gray-600">
                    <XCircle className="w-6 h-6" />
                  </button>
                </div>
                <div className="p-6 overflow-y-auto flex-1">
                  <p className="text-sm text-gray-600 mb-4">
                    明細の「摘要（内容）」に以下のキーワードが含まれている場合、自動的にチェックが入り勘定科目が設定されます。
                  </p>
                  <div className="space-y-3">
                    {rules.map((rule, index) => (
                      <div key={rule.id} className="flex gap-3 items-center bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <input
                          type="text"
                          value={rule.keyword}
                          onChange={(e) => {
                            const newRules = [...rules];
                            newRules[index].keyword = e.target.value;
                            setRules(newRules);
                          }}
                          className="flex-1 p-2 border border-gray-200 rounded text-sm outline-none focus:border-indigo-500"
                          placeholder="キーワード (例: Kindle)"
                        />
                        <select
                          value={rule.category}
                          onChange={(e) => {
                            const newRules = [...rules];
                            newRules[index].category = e.target.value;
                            setRules(newRules);
                          }}
                          className="w-40 p-2 border border-gray-200 rounded text-sm outline-none focus:border-indigo-500 bg-white"
                        >
                          {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                        <input
                          type="text"
                          value={rule.subCategory}
                          onChange={(e) => {
                            const newRules = [...rules];
                            newRules[index].subCategory = e.target.value;
                            setRules(newRules);
                          }}
                          className="w-28 p-2 border border-gray-200 rounded text-sm outline-none focus:border-indigo-500"
                          placeholder="補助科目"
                        />
                        <button
                          onClick={() => setRules(rules.filter(r => r.id !== rule.id))}
                          className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded"
                        >
                          <Trash2 className="w-4 h-4" />
                        </button>
                      </div>
                    ))}
                  </div>
                  <button
                    onClick={() => setRules([...rules, { id: Date.now(), keyword: '', category: '未定', subCategory: '' }])}
                    className="mt-4 flex items-center gap-1 text-sm font-medium text-indigo-600 hover:text-indigo-800 p-2 rounded hover:bg-indigo-50"
                  >
                    <Plus className="w-4 h-4" /> ルールを追加
                  </button>
                </div>
                <div className="p-4 border-t border-gray-100 bg-gray-50 rounded-b-xl flex justify-end">
                  <button
                    onClick={() => setIsRuleModalOpen(false)}
                    className="px-6 py-2 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition-colors shadow-sm"
                  >
                    完了
                  </button>
                </div>
              </div>
            </div>
          );

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">
              <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
                <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                  <div className="flex items-center gap-2 text-indigo-700">
                    <FileText className="w-6 h-6" />
                    <h1 className="text-xl font-bold tracking-tight">MFクラウド 仕訳コンバーター</h1>
                  </div>
                  <button
                    onClick={() => setIsRuleModalOpen(true)}
                    className="flex items-center gap-1.5 text-sm font-medium text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 rounded-md transition-colors"
                  >
                    <Settings className="w-4 h-4" />
                    自動ルール設定
                  </button>
                </div>
              </header>

              <main className="max-w-6xl mx-auto px-4 py-8">
                <div className="flex items-center mb-8 max-w-2xl mx-auto">
                  {[
                    { num: 1, title: 'CSV読込' },
                    { num: 2, title: '列の設定' },
                    { num: 3, title: '事業経費の抽出' }
                  ].map((s, i) => (
                    <React.Fragment key={s.num}>
                      <div className="flex flex-col items-center">
                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${
                          step >= s.num ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-200 text-slate-500'
                        }`}>
                          {s.num}
                        </div>
                        <span className={`text-xs mt-2 font-medium ${step >= s.num ? 'text-indigo-700' : 'text-slate-400'}`}>
                          {s.title}
                        </span>
                      </div>
                      {i < 2 && (
                        <div className={`flex-1 h-1 mx-4 rounded-full ${step > s.num ? 'bg-indigo-600' : 'bg-slate-200'}`} />
                      )}
                    </React.Fragment>
                  ))}
                </div>

                {step === 1 && (
                  <div className="bg-white p-10 rounded-2xl shadow-sm border border-slate-200 max-w-2xl mx-auto text-center">
                    <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
                      <Upload className="w-10 h-10" />
                    </div>
                    <h2 className="text-2xl font-bold text-slate-800 mb-2">明細CSVをアップロード</h2>
                    <p className="text-slate-500 mb-8">
                      クレジットカードや銀行のWebサイトからダウンロードした明細（CSVファイル）を選択してください。
                    </p>
                    <label className="inline-flex items-center justify-center px-8 py-3 text-base font-medium text-white bg-indigo-600 rounded-xl cursor-pointer hover:bg-indigo-700 hover:shadow-lg transition-all active:scale-95">
                      <span>ファイルを選択する</span>
                      <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                    </label>
                  </div>
                )}

                {step === 2 && (
                  <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 max-w-2xl mx-auto">
                    <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                      <CheckCircle2 className="w-5 h-5 text-indigo-600" />
                      列を正しく割り当ててください
                    </h2>
                    <p className="text-sm text-slate-600 mb-6 bg-blue-50 p-3 rounded-lg">
                      読み込んだファイル「{fileName}」のどの列に情報が入っているか指定します。<br/>
                      ※システムが自動推測していますが、間違っている場合は直してください。
                    </p>

                    <div className="space-y-5">
                      {[
                        { key: 'date', label: '取引日（利用日）' },
                        { key: 'desc', label: '摘要（利用店名・内容）' },
                        { key: 'amount', label: '金額' }
                      ].map(field => (
                        <div key={field.key} className="flex items-center gap-4 p-4 border border-slate-100 rounded-xl bg-slate-50">
                          <div className="w-1/3 font-medium text-slate-700">{field.label}</div>
                          <div className="w-2/3">
                            <select
                              value={colMap[field.key]}
                              onChange={(e) => setColMap({ ...colMap, [field.key]: e.target.value })}
                              className="w-full p-2.5 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white"
                            >
                              <option value="">-- 列を選択 --</option>
                              {headers.map((h, i) => (
                                <option key={i} value={i}>{`列${i + 1}: ${h}`}</option>
                              ))}
                            </select>
                          </div>
                        </div>
                      ))}
                    </div>

                    <div className="mt-8 flex justify-between">
                      <button
                        onClick={() => setStep(1)}
                        className="px-6 py-2.5 text-slate-600 font-medium hover:bg-slate-100 rounded-lg transition-colors"
                      >
                        戻る
                      </button>
                      <button
                        onClick={processRecords}
                        disabled={colMap.date === '' || colMap.desc === '' || colMap.amount === ''}
                        className="px-6 py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
                      >
                        経費を抽出する
                        <ArrowRight className="w-4 h-4" />
                      </button>
                    </div>
                  </div>
                )}

                {step === 3 && (
                  <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[80vh]">
                    <div className="p-5 border-b border-slate-200 bg-white flex justify-between items-center sticky top-0 z-10">
                      <div>
                        <h2 className="text-xl font-bold text-slate-800">経費の確認と編集</h2>
                        <p className="text-sm text-slate-500 mt-1">
                          チェックが入っているものが事業用としてMFクラウドにエクスポートされます。
                        </p>
                      </div>
                      <div className="flex gap-3">
                        <button
                          onClick={() => setIsRuleModalOpen(true)}
                          className="px-4 py-2 text-sm font-medium text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-lg transition-colors flex items-center gap-2"
                        >
                          <Settings className="w-4 h-4" /> ルール調整
                        </button>
                        <button
                          onClick={exportCSV}
                          className="px-5 py-2 bg-emerald-600 text-white text-sm font-bold rounded-lg hover:bg-emerald-700 transition-colors shadow-sm flex items-center gap-2 active:scale-95"
                        >
                          <Download className="w-4 h-4" />
                          MF形式でCSVダウンロード
                        </button>
                      </div>
                    </div>

                    <div className="overflow-auto flex-1 bg-slate-50 p-4">
                      <div className="bg-white rounded-xl shadow-sm border border-slate-200">
                        <table className="w-full text-left border-collapse">
                          <thead>
                            <tr className="bg-slate-100/50 text-slate-600 text-sm border-b border-slate-200">
                              <th className="p-3 font-medium w-16 text-center">事業用</th>
                              <th className="p-3 font-medium w-28">日付</th>
                              <th className="p-3 font-medium">摘要（内容）</th>
                              <th className="p-3 font-medium w-28 text-right">金額</th>
                              <th className="p-3 font-medium w-48">借方（経費の科目）</th>
                              <th className="p-3 font-medium w-32">補助科目</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100 text-sm">
                            {records.map((r) => (
                              <tr key={r.id} className={`hover:bg-slate-50 transition-colors ${r.isTarget ? 'bg-indigo-50/30' : 'opacity-60 grayscale'}`}>
                                <td className="p-3 text-center">
                                  <input
                                    type="checkbox"
                                    checked={r.isTarget}
                                    onChange={(e) => handleRecordChange(r.id, 'isTarget', e.target.checked)}
                                    className="w-5 h-5 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500 cursor-pointer"
                                  />
                                </td>
                                <td className="p-3 text-slate-700 font-mono text-xs">{r.date}</td>
                                <td className="p-3 text-slate-800 font-medium truncate max-w-[200px]" title={r.desc}>{r.desc}</td>
                                <td className="p-3 text-right font-mono text-slate-700">¥{r.amount.toLocaleString()}</td>
                                <td className="p-3">
                                  <select
                                    value={r.category}
                                    onChange={(e) => {
                                      handleRecordChange(r.id, 'category', e.target.value);
                                      // 科目を手動変更したら自動的に事業用チェックを入れる
                                      if (!r.isTarget && e.target.value !== '未定') {
                                        handleRecordChange(r.id, 'isTarget', true);
                                      }
                                    }}
                                    className={`w-full p-1.5 border rounded outline-none focus:border-indigo-500 text-sm ${r.category === '未定' && r.isTarget ? 'border-red-300 bg-red-50' : 'border-slate-200 bg-white'}`}
                                    disabled={!r.isTarget}
                                  >
                                    {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                  </select>
                                </td>
                                <td className="p-3">
                                  <input
                                    type="text"
                                    value={r.subCategory}
                                    onChange={(e) => handleRecordChange(r.id, 'subCategory', e.target.value)}
                                    className="w-full p-1.5 border border-slate-200 rounded outline-none focus:border-indigo-500 bg-white text-sm"
                                    placeholder="補助"
                                    disabled={!r.isTarget}
                                  />
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                        {records.length === 0 && (
                          <div className="p-8 text-center text-slate-500">
                            データが見つかりませんでした。列の設定が正しいか確認してください。
                          </div>
                        )}
                      </div>
                    </div>
                    <div className="p-4 border-t border-slate-200 bg-slate-50 text-sm text-slate-600 flex justify-between items-center">
                      <div>
                        全 {records.length} 件中、<span className="font-bold text-indigo-700">{records.filter(r => r.isTarget).length} 件</span> を事業用として書き出します。
                      </div>
                      <button
                        onClick={() => setStep(2)}
                        className="text-slate-500 hover:text-slate-800 underline"
                      >
                        列の設定に戻る
                      </button>
                    </div>
                  </div>
                )}
              </main>

              {isRuleModalOpen && <RuleSettingsModal />}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
